name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] # Verify if your repo uses 'main' or 'master'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Sync Model Subfolder to Hugging Face
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Sagnik66/Astrum
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
          subdirectory: model  # Extracts ONLY your model folder contents to the Space root